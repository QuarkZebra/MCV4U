<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCV4U — Calculus &amp; Vectors</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f8f7f4;--white:#fff;--hover:#faf9f7;
  --blue:#1e3a5f;--accent:#2563eb;--accent-dim:rgba(37,99,235,.08);--accent-bdr:rgba(37,99,235,.2);
  --gold:#a07808;--teal:#0b7d8c;--rose:#b05050;--muted:#7a7a8a;--muted2:#b0b0ba;
  --text:#1a1a2e;--t2:#4a4a5a;--t3:#8a8a9a;--t4:#b8b8c4;
  --bdr:#e5e3df;--bdr2:#d0cec8;
  --err:#dc2626;--amber:#d97706;--amber-dim:rgba(217,119,6,.06);
  --test-bg:rgba(196,92,92,.06);--quiz-bg:rgba(80,130,196,.05);--review-bg:rgba(90,155,100,.04);
  --r:10px;--sh:0 1px 2px rgba(0,0,0,.04);--sh2:0 1px 3px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.03);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;
  background-image:linear-gradient(rgba(30,58,95,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(30,58,95,.04) 1px,transparent 1px);
  background-size:28px 28px;background-attachment:fixed}
a{color:inherit;text-decoration:none}

.page{max-width:1100px;margin:0 auto;padding:2.5rem 1.5rem 4rem}

/* Top Bar */
.top-bar{position:sticky;top:0;z-index:100;background:rgba(248,247,244,.88);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--bdr);margin:-2.5rem -1.5rem 2rem;padding:.6rem 1.5rem;display:flex;align-items:center;gap:.8rem}
.top-bar .lbl{font-family:'IBM Plex Mono',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);white-space:nowrap}
.ptrack{flex:1;height:3px;background:var(--bdr);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--teal));border-radius:2px;transition:width .6s}
.ptxt{font-family:'IBM Plex Mono',monospace;font-size:.65rem;color:var(--accent);font-weight:600;white-space:nowrap}

/* Header */
header{margin-bottom:2rem}
.htop{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:.5rem;flex-wrap:wrap}
.chip{font-family:'IBM Plex Mono',monospace;font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);
  padding:.22rem .65rem;border:1px solid var(--accent-bdr);border-radius:100px;background:var(--accent-dim);font-weight:600}
.hacts{display:flex;gap:.4rem}
.hbtn{font-family:'IBM Plex Mono',monospace;font-size:.65rem;color:var(--t3);cursor:pointer;background:var(--white);
  border:1px solid var(--bdr);padding:.22rem .65rem;border-radius:100px;transition:all .2s}
.hbtn:hover{color:var(--t2);border-color:var(--bdr2);background:var(--hover)}
header h1{font-size:2.5rem;font-weight:800;letter-spacing:-.04em;line-height:1.1;color:var(--blue)}
header .sub{color:var(--t3);font-size:.88rem;margin-top:.3rem;font-weight:400}

/* Search */
.sbar{display:flex;align-items:center;gap:.6rem;margin-bottom:1.2rem;padding:.55rem .9rem;background:var(--white);
  border:1px solid var(--bdr);border-radius:var(--r);box-shadow:var(--sh);transition:border-color .2s,box-shadow .2s}
.sbar:focus-within{border-color:var(--accent-bdr);box-shadow:0 0 0 3px var(--accent-dim)}
.sbar .si{color:var(--t4);font-size:.9rem}
.sbar input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Outfit',sans-serif;font-size:.85rem}
.sbar input::placeholder{color:var(--t4)}
.kbd{font-family:'IBM Plex Mono',monospace;font-size:.58rem;color:var(--t4);background:var(--bg);border:1px solid var(--bdr);padding:.1rem .35rem;border-radius:4px}

/* Units */
.unit{margin-bottom:.5rem;border:1px solid var(--bdr);border-radius:var(--r);background:var(--white);box-shadow:var(--sh);
  overflow:hidden;transition:all .3s ease;opacity:0;transform:translateY(20px)}
.unit.revealed{opacity:1;transform:translateY(0)}
.unit:hover{border-color:var(--bdr2);box-shadow:var(--sh2)}
.unit.current{border-color:var(--accent-bdr);box-shadow:0 0 0 3px var(--accent-dim),var(--sh2)}

.uhead{display:flex;align-items:center;padding:.9rem 1.15rem;cursor:pointer;user-select:none;transition:background .15s;gap:.8rem}
.uhead:hover{background:var(--hover)}
.unum{font-family:'IBM Plex Mono',monospace;font-size:.68rem;color:var(--t4);font-weight:600;min-width:1.6rem}
.current .unum{color:var(--accent)}
.utitle{flex:1;font-size:1.02rem;font-weight:600;color:var(--text);letter-spacing:-.01em}
.ucount{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--t4)}
.utag{font-family:'IBM Plex Mono',monospace;font-size:.56rem;letter-spacing:.06em;text-transform:uppercase;padding:.15rem .5rem;border-radius:100px;font-weight:600}
.utag.active{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-bdr)}
.utag.done{background:rgba(13,148,136,.06);color:var(--teal)}
.utag.upcoming{background:var(--bg);color:var(--t4)}
.chev{width:16px;height:16px;color:var(--t4);transition:transform .4s cubic-bezier(.34,1.56,.64,1);flex-shrink:0}
.unit.open .chev{transform:rotate(180deg);color:var(--t3)}
.ubody{display:grid;grid-template-rows:0fr;transition:grid-template-rows .4s cubic-bezier(.4,0,.2,1)}
.unit.open .ubody{grid-template-rows:1fr}
.ubody-inner{overflow:hidden}
.ucontent{padding:0;border-top:1px solid var(--bdr)}

/* Table inside unit */
.ltable{width:100%;border-collapse:collapse;font-size:.84rem}
.ltable thead tr{background:var(--bg)}
.ltable th{font-family:'IBM Plex Mono',monospace;font-size:.6rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;
  color:var(--t3);padding:.55rem 1rem;text-align:left;border-bottom:1px solid var(--bdr);white-space:nowrap}
.ltable th:first-child{width:2.5rem;text-align:center}
.ltable .th-topic{min-width:220px}
.ltable .th-hw{min-width:180px}
.ltable .th-extra{min-width:180px}
.ltable td{padding:.6rem 1rem;vertical-align:top;border-bottom:1px solid rgba(0,0,0,.03)}
.ltable tr:last-child td{border-bottom:none}
.ltable tr:hover{background:rgba(0,0,0,.01)}
.ltable tr.is-test{background:var(--test-bg)}
.ltable tr.is-test:hover{background:rgba(196,92,92,.09)}
.ltable tr.is-quiz{background:var(--quiz-bg)}
.ltable tr.is-review{background:var(--review-bg)}

.td-num{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--t4);text-align:center;width:2.5rem}
.td-topic{font-weight:400}

/* Link groups */
.lgroup{display:flex;flex-direction:column;gap:.25rem}
.dlink{display:inline-flex;align-items:center;gap:.3rem;font-size:.8rem;transition:opacity .15s;line-height:1.35}
.dlink:hover{opacity:.7;text-decoration:underline}
.dlink.note-link{color:var(--accent);font-weight:500}
.dlink.completed-link{color:var(--teal);font-size:.72rem;font-weight:500;position:relative}
.dlink.completed-link.soon{color:var(--t4);cursor:default}
.dlink.completed-link.soon:hover{opacity:1;text-decoration:none}
.dlink.soln{color:var(--teal);font-size:.72rem}
.dlink.vid{color:var(--rose);font-size:.72rem}
.dlink.extra{color:var(--muted);font-size:.72rem}
.dlink.hw-link{color:var(--t2);font-size:.8rem}
.licon{width:11px;height:11px;flex-shrink:0;opacity:.7}

/* Date next to topic */
.topic-head{display:flex;align-items:baseline;gap:.5rem;margin-bottom:.15rem}
.lesson-date{font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:var(--t4);white-space:nowrap;margin-left:auto}

/* Test badge */
.test-badge{display:inline-block;background:#c45c5c;color:#fff;font-family:'IBM Plex Mono',monospace;font-size:.62rem;
  letter-spacing:.06em;text-transform:uppercase;padding:.18rem .5rem;border-radius:3px;font-weight:500}

/* HW tag */
.hw-tag{font-family:'IBM Plex Mono',monospace;font-size:.58rem;color:var(--t4);background:var(--bg);
  padding:.06rem .28rem;border-radius:3px;font-weight:600;vertical-align:1px;margin-right:.2rem}

/* Squiggly error */
.hw-err{color:var(--err);font-family:'IBM Plex Mono',monospace;font-size:.76rem;font-weight:600;
  text-decoration:underline wavy var(--err);text-decoration-skip-ink:none;text-underline-offset:3px;cursor:help;position:relative}
.hw-err .tip{display:none;position:absolute;left:50%;transform:translateX(-50%);
  background:#fff;border:1px solid rgba(220,38,38,.2);color:var(--err);padding:.25rem .6rem;border-radius:6px;
  font-size:.65rem;font-family:'Outfit',sans-serif;white-space:nowrap;z-index:20;text-decoration:none;
  box-shadow:0 4px 12px rgba(220,38,38,.08);font-weight:500;pointer-events:none}
/* Default: above */
.hw-err .tip{bottom:calc(100% + 6px)}
.hw-err .tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:rgba(220,38,38,.2)}
/* Below variant for first rows */
.hw-err .tip.below{bottom:auto;top:calc(100% + 6px)}
.hw-err .tip.below::after{top:auto;bottom:100%;border-top-color:transparent;border-bottom-color:rgba(220,38,38,.2)}
.hw-err:hover .tip{display:block}

/* Completed note tooltip */
.cn-wrap{position:relative;display:inline-flex}
.cn-tip{display:none;position:absolute;left:50%;transform:translateX(-50%);
  background:var(--text);color:#fff;padding:.2rem .55rem;border-radius:5px;font-size:.62rem;
  font-family:'Outfit',sans-serif;white-space:nowrap;z-index:20;pointer-events:none}
.cn-tip{bottom:calc(100% + 5px)}
.cn-tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:var(--text)}
.cn-tip.below{bottom:auto;top:calc(100% + 5px)}
.cn-tip.below::after{top:auto;bottom:100%;border-top-color:transparent;border-bottom-color:var(--text)}
.cn-wrap:hover .cn-tip{display:block}

/* Note title tooltip */
.nt-wrap{position:relative;display:inline}
.nt-tip{display:none;position:absolute;left:50%;transform:translateX(-50%);
  background:var(--text);color:#fff;padding:.2rem .55rem;border-radius:5px;font-size:.62rem;
  font-family:'Outfit',sans-serif;white-space:nowrap;z-index:20;pointer-events:none}
.nt-tip{bottom:calc(100% + 5px)}
.nt-tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:var(--text)}
.nt-tip.below{bottom:auto;top:calc(100% + 5px)}
.nt-tip.below::after{top:auto;bottom:100%;border-top-color:transparent;border-bottom-color:var(--text)}
.nt-wrap:hover .nt-tip{display:block}

/* Legend & FAB */
.legend{margin-top:2.5rem;padding-top:1.25rem;border-top:1px solid var(--bdr);display:flex;flex-wrap:wrap;gap:1.5rem;font-size:.75rem;color:var(--t4)}
.legend-item{display:flex;align-items:center;gap:.4rem}
.legend-squig{color:var(--err);text-decoration:underline wavy var(--err);text-underline-offset:3px;font-family:'IBM Plex Mono',monospace;font-size:.72rem;font-weight:600}
.fab{position:fixed;bottom:1.5rem;right:1.5rem;z-index:200;background:var(--accent);color:#fff;border:none;border-radius:100px;
  padding:.55rem 1rem;font-family:'IBM Plex Mono',monospace;font-size:.68rem;font-weight:600;cursor:pointer;
  box-shadow:0 4px 20px rgba(37,99,235,.25);transition:all .25s;display:none;align-items:center;gap:.35rem}
.fab:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(37,99,235,.35)}
.fab.visible{display:flex}

@media(max-width:768px){
  .page{padding:2rem .75rem}header h1{font-size:2rem}
  .top-bar{margin:-2rem -.75rem 1.5rem;padding:.5rem .75rem}
  .ltable .th-extra,.ltable td:last-child{display:none}
  .fab{bottom:1rem;right:1rem}.hacts{display:none}
}
</style>
</head>
<body>
<div class="page">

<div class="top-bar">
  <span class="lbl">Course</span>
  <div class="ptrack"><div class="pfill" id="pf"></div></div>
  <span class="ptxt" id="pt"></span>
</div>

<header>
  <div class="htop">
    <span class="chip">MCV4U</span>
    <div class="hacts">
      <button class="hbtn" onclick="toggleAll()" id="expBtn">Expand All</button>
    </div>
  </div>
  <h1>Calculus &amp; Vectors</h1>
  <div class="sub">Grade 12 · University Preparation</div>
</header>

<div class="sbar">
  <span class="si">⌕</span>
  <input type="text" placeholder="Filter lessons..." id="si" oninput="filterL(this.value)">
  <span class="kbd">⌘K</span>
</div>

<div id="units"></div>

<div class="legend">
  <div class="legend-item"><span class="legend-squig">Ex</span><span>Textbook answer is wrong (hover)</span></div>
  <div class="legend-item"><span class="dlink note-link" style="pointer-events:none;font-size:.72rem">↗ Link</span><span>Blank note</span></div>
  <div class="legend-item"><span class="dlink soln" style="pointer-events:none">✓ Soln</span><span>Solution</span></div>
  <div class="legend-item"><span class="dlink vid" style="pointer-events:none">▶ Video</span><span>Video</span></div>
</div>
</div>

<button class="fab" id="fab" onclick="jumpC()">↑ Current Unit</button>

<script>
// ═══════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════
const CURRENT_UNIT = 2;
const TOTAL_UNITS = 7;

// ═══════════════════════════════════════════════
// ERRATA — from the textbook corrections spreadsheet
// Format: { "section question": true }
// These get squiggly underlines in the HW column
// ═══════════════════════════════════════════════
// ERRATA: keyed by "unit.day" → array of question numbers to squiggly-underline (without #)
// Derived from the Course Plan doc (only the wrong-answer questions left in HW/Extra columns)
const ERRATA_BY_DAY = {
  // Unit 1
  "1.2": ["7"],           // p. 9 #7
  "1.4": ["16"],          // p. 29 #16
  "1.7": ["10c"],         // p. 45 #10c
  // Unit 2
  "2.8": ["13"],          // p. 232 #13
  "2.11":["7"],           // p. 260 #7 (HW)
  "2.11x":["2a"],         // p. 260 #2a (Extra)
  // Unit 3
  "3.1": ["4b"],          // p. 127 #4b
  "3.5": ["20"],          // p. 265 #20
  // Unit 4
  "4.3x":["9d"],          // p. 193 #9d (Extra)
  "4.5": ["8a"],          // p. 205 #8a
  "4.7": ["16"],          // p. 216 #16
  // Unit 5
  "5.2": ["2"],           // p. 279 #2
  "5.4x":["4cd"],         // p. 298 #4cd (Extra)
  "5.8x":["2"],           // p. 324 #2 (Extra)
  // Unit 6
  "6.1": ["5","4","10","13"], // p. 362 #5, p. 369 #4, 10, 13
  "6.2": ["3"],           // p. 377 #3
  "6.6": ["13"],          // p. 407 #13
  "6.8": ["29"],          // p. 418 #29
  // Unit 7
  "7.1": ["10"],          // p. 433 #10
  "7.8": ["4a"],          // p. 496 #4a
  "7.15":["5"],           // p. 530 #5
  "7.18":["9a","12a"],    // p. 552 #9a, 12a
};

// Apply squiggly underline to matching question numbers in a HW string
function markErrata(text, unitIdx, dayN, isExtra) {
  const key = `${unitIdx+1}.${dayN}${isExtra ? 'x' : ''}`;
  const errs = ERRATA_BY_DAY[key];
  if (!errs) return text;
  let out = text;
  errs.forEach(q => {
    const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    // Lookbehind: preceded by # or ", " — match question number + optional trailing letters
    const re = new RegExp(`(?<=[#,]\\s*)(${escaped}[a-z]*)(?=[,\\s·]|$)`, 'g');
    out = out.replace(re, `<span class="hw-err">$1<span class="tip">Textbook answer is incorrect</span></span>`);
  });
  return out;
};

// ═══════════════════════════════════════════════
// ICONS
// ═══════════════════════════════════════════════
const IC = {
  doc: `<svg class="licon" viewBox="0 0 16 16" fill="currentColor"><path d="M4 4h5v2H4zm0 3h8v2H4zm0 3h6v2H4zm9-9H3a1 1 0 00-1 1v12a1 1 0 001 1h10a1 1 0 001-1V5l-4-4z"/></svg>`,
  vid: `<svg class="licon" viewBox="0 0 16 16" fill="currentColor"><path d="M6 3l7 5-7 5V3z"/></svg>`,
  soln: `<svg class="licon" viewBox="0 0 16 16" fill="currentColor"><path d="M6.5 12L2 7.5l1.4-1.4L6.5 9.2l6.1-6.1L14 4.5z"/></svg>`,
  link: `<svg class="licon" viewBox="0 0 16 16" fill="currentColor"><path d="M4.7 8.7l1.4-1.4 2.6 2.6-1.4 1.4A2 2 0 014.7 8.7zm6.6-6.6A2 2 0 008.7 4.7L7.3 6.1l2.6 2.6 1.4-1.4a2 2 0 000-2.6zM3.3 11.3a3 3 0 004.2 0l1.4-1.4-1.4-1.4-1.4 1.4a1 1 0 01-1.4-1.4l1.4-1.4-1.4-1.4-1.4 1.4a3 3 0 000 4.2z"/></svg>`,
};

function mkLink(text, href, type) {
  if (!href) return `<span style="font-size:.78rem;color:var(--t2)">${text}</span>`;
  let cls = 'dlink extra', icon = IC.doc;
  if (type === 'vid') { cls = 'dlink vid'; icon = IC.vid; }
  else if (type === 'soln') { cls = 'dlink soln'; icon = IC.soln; }
  else if (type === 'extra') { cls = 'dlink extra'; icon = IC.doc; }
  else { cls = 'dlink extra'; icon = IC.link; }
  return `<a href="${href}" target="_blank" class="${cls}">${icon}${text}</a>`;
}

// ═══════════════════════════════════════════════
// COURSE DATA
// ═══════════════════════════════════════════════
const C = [
{id:"u1",title:"Introduction to Calculus",status:"done",days:[
{n:1,d:"Mon Feb 2",topic:"Introduction to Calculus",blank:"https://drive.google.com/file/d/1CEOkaTlwz_rbUQmDKeoHELp7gapxonGP/view",filled:"https://drive.google.com/file/d/12SEUzVHsx8DiDAXhtTcJ_eWQMX-g5Ow_/view",
  hw:[{t:"Practice Questions on Today's Note"}],
  extra:[{t:"Prerequisite Skills Practice",h:"https://drive.google.com/file/d/1pLMiGwVR55y2MVe2E7NLnV_2FuLWa-n7/view"},{t:"Course Outline",h:"https://docs.google.com/document/d/1_yPYKXsN6wgVb81CfnmPASnRtV5SGs60zj137Hijr2k/edit"},{t:"Textbook Corrections",h:"https://drive.google.com/file/d/1PmkAOQ8REabLz63bUSB__bqUDjxpb2o_/view"},{t:"Ch 1 Solutions",h:"https://drive.google.com/file/d/1rsD-yTdrHZ7j80flmT-HgWNYYWyHvFzV/view",y:"soln"},{t:"TVO Learn",h:"https://tvolearn.com/collections/courses/products/mcv4u-calculus-and-vectors-online-course",y:"vid"},{t:"Ms. Havrot's Videos",h:"https://www.youtube.com/c/MsHavrotsCanadianUniversityMathPrerequisites/playlists",y:"vid"}]},
{n:2,d:"Tues Feb 3",topic:"Rationalising",blank:"https://drive.google.com/file/d/1tFgsyRUnaa69TM-Uk8jU1WJAYYquzlwM/view",filled:"https://drive.google.com/file/d/1tz5bq51ajTdxCZn3nz72G0CS3qnClTQH/view",
  hw:[{t:"§1.1 p. 9 #3adf, 4b, 7"}],hwSoln:[],
  extra:[{t:"Vid: What are These Symbols?",h:"https://www.youtube.com/watch?v=fUCEg3HznX4",y:"vid"},{t:"Khan: Rationalising",h:"https://www.youtube.com/watch?v=ENIUcjdPO54",y:"vid"}]},
{n:3,d:"Weds Feb 4",topic:"Slope of a Tangent",blank:"https://drive.google.com/file/d/1tW2Ldvmn59l9axOxtGeP9OAn5N9yc4uL/view",filled:"https://drive.google.com/file/d/1OjUodFfi3iVK9s7oMX2a17zYHCyPTMA3/view",
  hw:[{t:"§1.2 p. 18 #1a, 3d, 8ac, 10ab, 11e, 15"}],
  extra:[{t:"Tangent Line Sim",h:"https://www.desmos.com/calculator/8gstpreekm"},{t:"More Prerequisite Skills",h:"https://drive.google.com/file/d/1pGeXlevOSndqIZAXqKWpsm9HraN3KsNR/view"}]},
{n:4,d:"Thurs Feb 5",topic:"Rates of Change",blank:"https://drive.google.com/file/d/1uBDaDgLu3bhVx0Qd9G-dSJ2x-S_xKaGM/view",filled:"https://drive.google.com/file/d/1nDwWtyFy5rLu6RjUodpBhcJUuwY0wH0P/view",
  hw:[{t:"§1.3 p. 29 #1, 8, 12, 16, 18"}],hwSoln:[{t:"Soln: #18",h:"https://drive.google.com/file/d/1BRNaBPA7aa9bzGiRR73kDrf7uNcbyt8V/view",y:"soln"}],

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════

function renderExtra(items, unitIdx, dayN) {
  if (!items || items.length === 0) return '<span style="color:var(--t4)">—</span>';
  return `<div class="lgroup">${items.map(i => {
    if (!i.h) {
      // Plain text extra — check for errata
      const marked = markErrata(i.t, unitIdx, dayN, true);
      return `<span style="font-size:.78rem;color:var(--t2)">${marked}</span>`;
    }
    return mkLink(i.t, i.h, i.y);
  }).join('')}</div>`;
}

function renderHW(day, unitIdx) {
  const parts = [];
  if (day.hw && day.hw.length > 0) {
    day.hw.forEach(h => {
      const marked = markErrata(h.t, unitIdx, day.n, false);
      parts.push(`<span style="font-size:.82rem"><span class="hw-tag">HW</span>${marked}</span>`);
    });
  }
  if (day.hwSoln && day.hwSoln.length > 0) {
    day.hwSoln.forEach(s => parts.push(mkLink(s.t, s.h, s.y)));
  }
  if (parts.length === 0) return '<span style="color:var(--t4)">—</span>';
  return `<div class="lgroup">${parts.join('')}</div>`;
}

function renderUnit(unit, idx) {
  const uIdx = idx + 1;
  const isCurrent = uIdx === CURRENT_UNIT;
  const status = isCurrent ? 'active' : (uIdx < CURRENT_UNIT ? 'done' : 'upcoming');
  const statusLabel = isCurrent ? 'Current' : (uIdx < CURRENT_UNIT ? 'Done' : 'Upcoming');

  const rows = unit.days.map((day, di) => {
    const rc = day.type === 'test' ? 'is-test' : day.type === 'quiz' ? 'is-quiz' : day.type === 'review' ? 'is-review' : '';
    const tipDir = di === 0 ? 'below' : '';

    // Topic cell
    let topicHTML = '';
    if (day.type === 'test') {
      topicHTML = `<div class="topic-head"><span class="test-badge">${day.topic}</span><span class="lesson-date">${day.d}</span></div>`;
    } else {
      let titleLink = '';
      if (day.blank) {
        titleLink = `<span class="nt-wrap"><a href="${day.blank}" target="_blank" class="dlink note-link">${IC.doc}${day.topic}</a><span class="nt-tip ${tipDir}">Click to view blank note</span></span>`;
      } else {
        titleLink = `<span style="font-size:.84rem;font-weight:500">${day.topic}</span>`;
      }
      let completedHTML = '';
      if (day.type !== 'test') {
        if (day.filled) {
          completedHTML = `<span class="cn-wrap"><a href="${day.filled}" target="_blank" class="dlink completed-link">${IC.soln}Completed Note</a></span>`;
        } else if (day.blank) {
          completedHTML = `<span class="cn-wrap"><span class="dlink completed-link soon">${IC.doc}Completed Note</span><span class="cn-tip ${tipDir}">Coming soon</span></span>`;
        }
      }
      topicHTML = `<div class="topic-head">${titleLink}<span class="lesson-date">${day.d}</span></div>${completedHTML}`;
    }

    return `<tr class="${rc}"><td class="td-num">${day.n}</td><td class="td-topic">${topicHTML}</td><td>${renderHW(day, idx)}</td><td>${renderExtra(day.extra, idx, day.n)}</td></tr>`;
  }).join('');

  return `<div class="unit${isCurrent ? ' current' : ''}" data-unit="${uIdx}">
    <div class="uhead" onclick="toggleU(this)">
      <span class="unum">${String(uIdx).padStart(2,'0')}</span>
      <span class="utitle">${unit.title}</span>
      <span class="ucount">${unit.days.length} days</span>
      <span class="utag ${status}">${statusLabel}</span>
      <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
    </div>
    <div class="ubody"><div class="ubody-inner"><div class="ucontent">
      <table class="ltable">
        <thead><tr><th>#</th><th class="th-topic">Topic</th><th class="th-hw">Homework</th><th class="th-extra">Extra Practice / Resources</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div></div></div>
  </div>`;
}

// Build
const container = document.getElementById('units');
container.innerHTML = C.map((u, i) => renderUnit(u, i)).join('');

// ── Toggle ──
function toggleU(h) { h.parentElement.classList.toggle('open'); }

let allExp = false;
function toggleAll() {
  allExp = !allExp;
  document.querySelectorAll('.unit').forEach(u => allExp ? u.classList.add('open') : u.classList.remove('open'));
  document.getElementById('expBtn').textContent = allExp ? 'Collapse All' : 'Expand All';
  if (!allExp) { const c = document.querySelector(`.unit[data-unit="${CURRENT_UNIT}"]`); if (c) c.classList.add('open'); }
}

// ── Search ──
function filterL(q) {
  q = q.toLowerCase().trim();
  document.querySelectorAll('.unit').forEach(u => {
    if (!q) { u.style.display = ''; return; }
    const m = u.textContent.toLowerCase().includes(q);
    u.style.display = m ? '' : 'none';
    if (m && q.length > 1) u.classList.add('open');
  });
}
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); document.getElementById('si').focus(); }
  if (e.key === 'Escape') { const i = document.getElementById('si'); i.blur(); i.value = ''; filterL(''); }
});

// ── Jump ──
function jumpC() {
  const c = document.querySelector('.unit.current');
  if (c) { c.scrollIntoView({ behavior: 'smooth', block: 'center' }); if (!c.classList.contains('open')) c.classList.add('open'); }
}

// ── Scroll reveal ──
const rObs = new IntersectionObserver(es => {
  es.forEach(e => { if (e.isIntersecting) { e.target.classList.add('revealed'); rObs.unobserve(e.target); } });
}, { threshold: 0.05, rootMargin: '0px 0px -30px 0px' });

const fObs = new IntersectionObserver(([e]) => {
  document.getElementById('fab').classList.toggle('visible', !e.isIntersecting);
}, { threshold: 0.1 });

document.addEventListener('DOMContentLoaded', () => {
  const c = document.querySelector(`.unit[data-unit="${CURRENT_UNIT}"]`);
  if (c) c.classList.add('open');

  const done = CURRENT_UNIT - 1;
  document.getElementById('pf').style.width = Math.round((done / TOTAL_UNITS) * 100) + '%';
  document.getElementById('pt').textContent = `${done}/${TOTAL_UNITS}`;

  document.querySelectorAll('.unit').forEach((u, i) => {
    u.style.transitionDelay = `${i * 0.07}s`;
    u.style.transitionDuration = '0.55s';
    u.style.transitionTimingFunction = 'cubic-bezier(0.16, 1, 0.3, 1)';
    u.style.transitionProperty = 'opacity, transform';
    rObs.observe(u);
  });

  if (c) fObs.observe(c);
});
</script>
